name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deploy folder (HTML/CSS/JS/images only, no PDFs/MP4)
        run: |
          mkdir -p _site
          rsync -av \
            --include='*.html' \
            --include='*.css' \
            --include='*.js' \
            --include='*.png' \
            --include='*.jpg' \
            --include='*.jpeg' \
            --include='*.ico' \
            --include='*.webp' \
            --include='*.svg' \
            --include='*.gif' \
            --include='*.woff' \
            --include='*.woff2' \
            --include='*.ttf' \
            --include='*.json' \
            --include='*.txt' \
            --include='*.xml' \
            --exclude='*.pdf' \
            --exclude='*.mp4' \
            --exclude='*.mp3' \
            --exclude='*.pptx' \
            --exclude='*.psd' \
            --exclude='*.ai' \
            --exclude='*.zip' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.vscode/' \
            --exclude='.claude/' \
            --exclude='.agents/' \
            --exclude='node_modules/' \
            --exclude='*.md' \
            --exclude='*.workspace' \
            --exclude='*.log' \
            --filter='+ */' \
            . _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
